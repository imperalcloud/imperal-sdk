[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "imperal-sdk"
version = "0.2.0"
description = "SDK for building Imperal Cloud extensions — includes Auth SDK (JWT verification, scopes, FastAPI middleware), extension framework, and CLI"
license = "AGPL-3.0-or-later"
authors = [
    { name = "Valentin Scerbacov" },
    { name = "Imperal, Inc." },
]
classifiers = [
    "Development Status :: 4 - Beta",
    "License :: OSI Approved :: GNU Affero General Public License v3 or later (AGPLv3+)",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Topic :: Security",
    "Framework :: FastAPI",
]
requires-python = ">=3.9"
dependencies = [
    "httpx>=0.28.0",
    "pyjwt[crypto]>=2.10.0",
    "pydantic>=2.10.0",
    "click>=8.1.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0.0",
    "pytest-asyncio>=0.25.0",
    "respx>=0.22.0",
]
fastapi = [
    "fastapi>=0.115.0",
]
db = [
    "sqlalchemy[asyncio]>=2.0.30",
    "aiomysql>=0.2.0",
]

[project.scripts]
imperal = "imperal_sdk.cli.main:cli"

[tool.hatch.build.targets.wheel]
packages = ["src/imperal_sdk"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
